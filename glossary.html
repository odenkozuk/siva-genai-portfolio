<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Glossary — Kandula Siva Nagaraju</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --bg2: #0f1118;
  --bg3: #161923;
  --bg4: #1e2230;
  --border: #252936;
  --border2: #2e3345;
  --accent: #3bffa0;
  --accent2: #7b8cff;
  --accent3: #ff6b8a;
  --accent4: #ffb347;
  --accent5: #54d4ff;
  --text: #e2e5f0;
  --text2: #8990ac;
  --text3: #4a5068;
  --glow: rgba(59,255,160,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}

/* ─── HEADER ─── */
.site-header{
  background:rgba(8,10,15,0.95);
  border-bottom:1px solid var(--border);
  padding:18px 28px;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:12px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.brand h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-0.3px}
.brand h1 span{color:var(--accent)}
.brand p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;
  padding:9px 14px 9px 36px;border-radius:8px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,255,160,0.1)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.search-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap}

/* ─── LAYOUT ─── */
.layout{display:flex;min-height:calc(100vh - 62px)}

/* ─── SIDEBAR ─── */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky;top:62px;height:calc(100vh - 62px);
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sidebar-section{padding:0 16px;margin-bottom:8px}
.sidebar-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;
  padding:8px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:6px;
}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:7px 8px;border-radius:6px;
  background:transparent;border:none;
  color:var(--text2);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.15s;text-align:left;
}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(59,255,160,0.08);color:var(--accent)}
.cat-btn .cat-count{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  background:var(--bg4);padding:1px 6px;border-radius:3px;color:var(--text3);
}
.cat-btn.active .cat-count{background:rgba(59,255,160,0.15);color:var(--accent)}

/* ─── MAIN ─── */
.main{flex:1;padding:24px 28px 80px;overflow-y:auto}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;margin-top:8px;
}
.section-title{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:2px;color:var(--text3);
}
.section-line{flex:1;height:1px;background:var(--border)}

/* ─── CARDS ─── */
.cards-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  transition:border-color 0.2s,transform 0.15s;
  animation:fadeIn 0.25s ease both;
}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.open{border-color:var(--border2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card-head{
  padding:14px 18px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  user-select:none;
}
.card-emoji{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.card-title-wrap{flex:1}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-tagline{font-size:11px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.card-right{display:flex;align-items:center;gap:8px}
.card-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;
}
.tag-core{background:rgba(59,255,160,0.08);color:var(--accent);border:1px solid rgba(59,255,160,0.2)}
.tag-model{background:rgba(123,140,255,0.08);color:var(--accent2);border:1px solid rgba(123,140,255,0.2)}
.tag-rag{background:rgba(84,212,255,0.08);color:var(--accent5);border:1px solid rgba(84,212,255,0.2)}
.tag-framework{background:rgba(255,179,71,0.08);color:var(--accent4);border:1px solid rgba(255,179,71,0.2)}
.tag-agent{background:rgba(255,107,138,0.08);color:var(--accent3);border:1px solid rgba(255,107,138,0.2)}
.tag-azure{background:rgba(0,120,212,0.1);color:#5ba3f5;border:1px solid rgba(0,120,212,0.25)}
.tag-ops{background:rgba(255,179,71,0.08);color:var(--accent4);border:1px solid rgba(255,179,71,0.2)}
.tag-infra{background:rgba(150,150,150,0.08);color:#9aa;border:1px solid rgba(150,150,150,0.2)}
.chevron{color:var(--text3);font-size:14px;transition:transform 0.25s;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}

.card-body{
  display:none;padding:0 18px 20px;
  border-top:1px solid var(--border);
}
.card.open .card-body{display:block}

/* Body sections */
.body-block{margin-top:16px}
.body-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.body-label::after{content:'';flex:1;height:1px;background:var(--border)}
.body-text{font-size:13px;line-height:1.8;color:#bcc2d8}
.body-text strong{color:var(--accent);font-weight:700}
.body-text em{color:var(--accent2);font-style:normal}
.body-text b{color:var(--text);font-weight:600}

/* Chain */
.chain-wrap{
  display:flex;align-items:center;gap:0;flex-wrap:wrap;
  margin-top:8px;gap:4px;
}
.chain-item{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--bg3);border:1px solid var(--border2);
  padding:4px 10px;border-radius:4px;color:var(--text2);
  cursor:pointer;transition:all 0.15s;
}
.chain-item:hover{border-color:var(--accent2);color:var(--accent2)}
.chain-item.current{background:rgba(59,255,160,0.08);border-color:var(--accent);color:var(--accent)}
.chain-arrow{color:var(--text3);font-size:12px;padding:0 2px}

/* Code block */
.code-block{
  background:var(--bg);border:1px solid var(--border);
  border-left:3px solid var(--accent2);
  border-radius:0 6px 6px 0;
  padding:12px 14px;margin-top:8px;
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:#a8b0cc;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
}
.code-block .kw{color:var(--accent2)}
.code-block .str{color:var(--accent)}
.code-block .cm{color:var(--text3)}

/* Example badge */
.example-box{
  background:rgba(59,255,160,0.04);
  border:1px solid rgba(59,255,160,0.15);
  border-radius:6px;padding:10px 14px;margin-top:8px;
  font-size:12px;color:#a8c8b8;line-height:1.7;
}
.example-box .ex-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--accent);font-weight:700;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:6px;
}

/* Models pills */
.models-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.model-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  background:var(--bg3);border:1px solid var(--border2);
  padding:3px 10px;border-radius:4px;color:var(--text2);
}

/* Usecase list */
.usecase-list{list-style:none;margin-top:8px;display:flex;flex-direction:column;gap:5px}
.usecase-list li{
  font-size:12px;color:#9499b5;
  padding-left:16px;position:relative;line-height:1.6;
}
.usecase-list li::before{content:'→';position:absolute;left:0;color:var(--accent2);font-weight:700}

/* Key point */
.keypoint{
  margin-top:12px;
  background:rgba(123,140,255,0.06);
  border:1px solid rgba(123,140,255,0.2);
  border-radius:6px;padding:10px 14px;
  font-size:12px;color:#9ca4cc;line-height:1.7;
  display:flex;gap:8px;
}
.keypoint::before{content:"⚡";font-size:13px;flex-shrink:0}

/* No results */
.no-results{
  text-align:center;padding:60px 20px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;color:var(--text3);display:none;
}

/* Stats bar */
.stats-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:8px 28px;display:flex;align-items:center;gap:24px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);
  z-index:100;
}
.stats-bar .stat span{color:var(--accent);font-weight:700}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px;padding-bottom:60px}
  .site-header{padding:12px 16px}
  .search-wrap{max-width:100%;min-width:0;flex:1}
}
</style>
</head>

<div class="stats-bar">

<script>
const TERMS = [

// ─── CORE AI/ML ───────────────────────────────────────────────
{
  id:"llm", cat:"core", emoji:"🧠", tag:"core", tagLabel:"Core AI",
  term:"LLM — Large Language Model",
  tagline:"The brain: predicts next token given context",
  chain:["LLM","Transformer","Attention Mechanism","Encoder-Decoder","Embeddings"],
  what:`An LLM is a neural network trained on massive text data to <strong>predict the next token</strong> (word/subword) in a sequence. By learning to do this billions of times, it implicitly learns grammar, facts, reasoning, and code.`,
  how:`<b>Training:</b> Feed billions of tokens. At each step, model predicts next token → compare to actual → compute loss → backpropagate → update weights. Repeat for months on thousands of GPUs.<br><br>
<b>Inference:</b> Given a prompt, the model generates tokens one at a time (autoregressive) until it hits a stop token or max length.<br><br>
<b>Key params:</b> Parameters = weights in the network. GPT-3 has 175B params, GPT-4 estimated ~1.8T. More params ≠ always better — architecture and training data quality matter.`,
  example:`At Cognizant, you used Azure OpenAI's GPT-4 as the LLM brain inside your RAG chatbot and multi-agent orchestrator. The LLM reasons over retrieved context and decides which sub-agent to call.`,
  models:["GPT-4","GPT-3.5","Mistral-7B","LLaMA-3","Claude 3","Gemini","Phi-3"],
  usecases:["RAG chatbots","Code generation","Summarization","Classification","Multi-agent reasoning"],
  keypoint:"LLMs don't 'know' things — they predict what token is statistically likely next. RAG is how you give them actual knowledge."
},
{
  id:"transformer", cat:"core", emoji:"⚙️", tag:"core", tagLabel:"Core AI",
  term:"Transformer Architecture",
  tagline:"The architecture all modern LLMs are built on",
  chain:["LLM","Transformer","Attention Mechanism","Encoder-Decoder","Embeddings"],
  what:`Transformer is the neural network architecture introduced in <em>'Attention Is All You Need' (2017, Google)</em>. All modern LLMs (GPT, BERT, LLaMA, Mistral) are built on it. It replaced RNNs/LSTMs by processing all tokens <strong>in parallel</strong> instead of sequentially.`,
  how:`<b>Core components:</b><br>
1. <strong>Token Embedding</strong> — Convert words → vectors<br>
2. <strong>Positional Encoding</strong> — Add position info (order matters)<br>
3. <strong>Multi-Head Attention</strong> — Each token attends to all others<br>
4. <strong>Feed-Forward Network</strong> — Per-token transformation<br>
5. <strong>Layer Norm + Residual</strong> — Stabilize training<br><br>
<b>Stack N of these blocks</b> = deeper reasoning. GPT-3 = 96 layers deep.`,
  codeblock:`Input: "The cat sat"
↓ Tokenize → [The=1024, cat=2731, sat=5892]
↓ Embed  → [[0.2,-0.4,...], [0.7,0.1,...], [-0.3,0.9,...]]
↓ + Pos  → add position vectors
↓ Attn   → each token weighs all others
↓ FFN    → transform each token
↓ Output → logits over vocabulary`,
  example:`Every model you use — GPT-4, Mistral, LLaMA, BERT — is a Transformer. When your LangChain SummarizationChain calls Azure OpenAI, it's calling a 96+ layer Transformer stack.`,
  models:["All modern LLMs","GPT family","BERT family","LLaMA","Mistral","T5"],
  usecases:["Foundation of all LLMs","NLP tasks","Code generation","Vision transformers (ViT)"],
  keypoint:"Transformer = parallel processing of all tokens via attention. This is why it's faster and more powerful than LSTM/RNN for long sequences."
},
{
  id:"attention", cat:"core", emoji:"👁️", tag:"core", tagLabel:"Core AI",
  term:"Attention Mechanism",
  tagline:"How the model decides what to focus on",
  chain:["LLM","Transformer","Attention Mechanism","Encoder-Decoder","Embeddings"],
  what:`Attention lets each token in a sequence <strong>look at all other tokens and decide how much to focus on each one</strong>. It's the key innovation that made Transformers powerful.`,
  how:`<b>Scaled Dot-Product Attention:</b><br>
For each token, compute 3 vectors from its embedding:<br>
— <strong>Q (Query)</strong>: "what am I looking for?"<br>
— <strong>K (Key)</strong>: "what do I contain?"<br>
— <strong>V (Value)</strong>: "what do I contribute?"<br><br>
Score = softmax(Q · Kᵀ / √d) · V<br><br>
<b>Multi-Head Attention:</b> Run H parallel attention heads. Each head learns different relationships (syntax, semantics, coreference). Concat outputs → linear projection.`,
  codeblock:`Example: "The animal didn't cross the street because it was tired"

When processing "it":
 → Q("it") attends to K("animal") = HIGH score 0.87
 → Q("it") attends to K("street") = low score 0.05
 → Q("it") attends to K("tired") = medium 0.41

Result: model knows "it" refers to "animal", not "street"`,
  example:`In your RAG chatbot, when GPT-4 reads retrieved chunks + user query, attention is how it decides which parts of the context are relevant to the answer.`,
  models:["All Transformers","Flash Attention (efficiency optimization)","Sparse Attention (GPT-3)"],
  usecases:["Token relationship modeling","Context understanding","Coreference resolution","Long-range dependencies"],
  keypoint:"Attention score = relevance between tokens. High score = 'pay attention here'. This is how LLMs understand context."
},
{
  id:"encoder_decoder", cat:"core", emoji:"🔄", tag:"core", tagLabel:"Core AI",
  term:"Encoder-Decoder Architecture",
  tagline:"Encoder reads, Decoder writes — used in seq2seq tasks",
  chain:["LLM","Transformer","Attention Mechanism","Encoder-Decoder","Embeddings"],
  what:`Two variants of Transformer architecture optimized for different tasks:<br>
<strong>Encoder-only</strong> (BERT): reads and understands text → great for classification, NER, embeddings.<br>
<strong>Decoder-only</strong> (GPT): generates text left-to-right → great for generation, chat.<br>
<strong>Encoder-Decoder</strong> (T5, BART): encoder reads input, decoder generates output → great for translation, summarization.`,
  how:`<b>Encoder (BERT-style):</b><br>
— Uses <em>bidirectional</em> attention: each token sees ALL other tokens in both directions<br>
— Output: rich contextual embedding of each token<br>
— Use: Classification<br><br>
<b>Decoder (GPT-style):</b><br>
— Uses <em>causal/masked</em> attention: each token only sees PAST tokens<br>
— Output: next token probabilities<br>
— Use: Generation (your Azure OpenAI chatbot responses)`,
  example:`Your NLP IT Service Desk (BERT + RoBERTa) uses encoder-only architecture for ticket classification. Your Azure OpenAI RAG chatbot uses decoder-only (GPT) for response generation.`,
  models:["Encoder: BERT, RoBERTa, DistilBERT","Decoder: GPT-4, LLaMA, Mistral","Enc-Dec: T5, BART, mT5"],
  usecases:["Encoder: classification, NER, embeddings","Decoder: chat, code, completion","Enc-Dec: translation, summarization"],
  keypoint:"Encoder = understand (bidirectional). Decoder = generate (left-to-right). GPT is decoder-only. BERT is encoder-only."
},
{
  id:"embeddings", cat:"core", emoji:"📐", tag:"core", tagLabel:"Core AI",
  term:"Embeddings",
  tagline:"Converting text into numbers (vectors) that capture meaning",
  chain:["LLM","Transformer","Attention Mechanism","Encoder-Decoder","Embeddings"],
  what:`An embedding is a <strong>dense vector of floating point numbers</strong> that represents the semantic meaning of text. Similar meanings → vectors are close in high-dimensional space.`,
  how:`<b>Word2Vec</b>: train on "context predicts word" — "king - man + woman ≈ queen"<br><br>
<b>Sentence embeddings (OpenAI text-embedding-ada-002)</b>:<br>
→ Pass text through encoder Transformer<br>
→ Pool the final layer hidden states<br>
→ Output: 1536-dimensional vector<br><br>
<b>Cosine similarity</b>: measure angle between vectors<br>
→ 1.0 = identical meaning, 0 = unrelated, -1 = opposite`,
  codeblock:`"Azure OpenAI" → [0.23, -0.71, 0.44, ..., 0.12]  (1536 dims)
"Microsoft cloud AI" → [0.21, -0.69, 0.41, ..., 0.14]
cosine_similarity = 0.97  ✓ semantically close

"cat food"  → [-0.45, 0.88, -0.33, ..., 0.66]
cosine_similarity with above = 0.12  ✗ unrelated`,
  example:`In your RAG chatbot, user query gets embedded → compared to Azure AI Search index of embedded KB articles → top-k most similar chunks retrieved → fed to GPT-4.`,
  models:["OpenAI text-embedding-ada-002","OpenAI text-embedding-3-small/large","BERT sentence embeddings","E5, BGE, Instructor"],
  usecases:["Vector search in RAG","Semantic similarity","Clustering documents","Anomaly detection"],
  keypoint:"Embeddings are how machines understand meaning. Close vectors = similar meaning. This is the foundation of all semantic search."
},
{
  id:"nlp", cat:"core", emoji:"📝", tag:"core", tagLabel:"Core AI",
  term:"NLP — Natural Language Processing",
  tagline:"Teaching machines to understand and generate human language",
  chain:["NLP","Tokenization","Embeddings","Transformer"],
  what:`NLP is the field covering all tasks involving human language. Classic NLP used rules + statistics. Modern NLP uses Transformers for almost everything.`,
  how:`<b>Core NLP tasks:</b><br>
— <em>Tokenization</em>: split text into subword tokens<br>
— <em>Classification</em>: assign label (your IT ticket routing)<br>
— <em>NER</em>: extract entities (names, dates, org names)<br>
— <em>Summarization</em>: condense long text (your LangChain chains)<br>
— <em>QA</em>: answer questions from context (your RAG chatbot)`,

// ─── RENDER ENGINE ─────────────────────────────────────────
const CAT_COLORS = {
  core:"tag-core", model:"tag-model", finetune:"tag-core",
  rag:"tag-rag", vecdb:"tag-rag",
  framework:"tag-framework", agent:"tag-agent",
  azure:"tag-azure", ops:"tag-ops", infra:"tag-infra"
};

const CAT_LABELS = {
  core:"Core AI", model:"Model", finetune:"Fine-tuning",
  rag:"RAG", vecdb:"Vector DB",
  framework:"Framework", agent:"Multi-Agent",
  azure:"Azure", ops:"LLMOps", infra:"Infrastructure"
};

const CAT_SECTION_ORDER = [
  {key:"core", label:"Core AI / ML Fundamentals"},
  {key:"model", label:"Models"},
  {key:"finetune", label:"Fine-tuning & Prompting"},
  {key:"rag", label:"RAG & Retrieval"},
  {key:"vecdb", label:"Vector Databases"},
  {key:"framework", label:"Frameworks — LangChain Stack"},
  {key:"agent", label:"Multi-Agent Systems"},
  {key:"azure", label:"Azure Services"},
  {key:"ops", label:"LLMOps & Evaluation"},
  {key:"infra", label:"Infrastructure & Tools"},
];

let openSet = new Set();
let currentCat = "all";
let searchTerm = "";

function buildCard(item, delay=0) {
  const tagClass = CAT_COLORS[item.cat] || "tag-core";
  const tagLabel = CAT_LABELS[item.cat] || item.cat;
  const isOpen = openSet.has(item.id);

  let chainHtml = "";
  if (item.chain) {
    chainHtml = `<div class="chain-wrap">` +
      item.chain.map((c,i) =>
        (i>0 ? `<span class="chain-arrow">→</span>` : "") +
        `<span class="chain-item${i===0?' current':''}">${c}</span>`
      ).join("") + `</div>`;
  }

  let modelsHtml = item.models?.length ? `<div class="body-block">
    <div class="body-label">Models / Tools</div>
    <div class="models-wrap">${item.models.map(m=>`<span class="model-pill">${m}</span>`).join("")}</div>
  </div>` : "";

  let usecaseHtml = item.usecases?.length ? `<div class="body-block">
    <div class="body-label">Use Cases</div>
    <ul class="usecase-list">${item.usecases.map(u=>`<li>${u}</li>`).join("")}</ul>
  </div>` : "";

  let codeHtml = item.codeblock ? `<div class="body-block">
    <div class="body-label">Code / Pattern</div>
    <div class="code-block">${item.codeblock}</div>
  </div>` : "";

  return `<div class="card${isOpen?' open':''}" id="card-${item.id}" style="animation-delay:${delay}s">
    <div class="card-head" onclick="toggle('${item.id}')">
      <div class="card-emoji">${item.emoji}</div>
      <div class="card-title-wrap">
        <div class="card-title">${item.term}</div>
        <div class="card-tagline">${item.tagline}</div>
      </div>
      <div class="card-right"><span class="card-tag ${tagClass}">${tagLabel}</span></div>
      <div class="chevron">▾</div>
    </div>
    <div class="card-body">
      ${item.chain ? `<div class="body-block"><div class="body-label">Concept Chain</div>${chainHtml}</div>` : ""}
      <div class="body-block"><div class="body-label">What It Is</div><div class="body-text">${item.what}</div></div>
      <div class="body-block"><div class="body-label">How It Works</div><div class="body-text">${item.how}</div></div>
      ${codeHtml}
      <div class="body-block"><div class="body-label">From Your Resume</div>
        <div class="example-box"><div class="ex-label">Your Example</div>${item.example}</div></div>
      ${modelsHtml}${usecaseHtml}
      ${item.keypoint ? `<div class="keypoint">${item.keypoint}</div>` : ""}
    </div>
  </div>`;
}

function getFiltered() {
  return TERMS.filter(t => {
    const matchCat = currentCat === "all" || t.cat === currentCat;
    if (!searchTerm) return matchCat;
    const q = searchTerm.toLowerCase();
    return matchCat && (
      t.term.toLowerCase().includes(q) ||
      t.tagline.toLowerCase().includes(q) ||
      t.what.toLowerCase().includes(q) ||
      (t.keypoint||"").toLowerCase().includes(q) ||
      (t.chain||[]).some(c=>c.toLowerCase().includes(q))
    );
  });
}

function render() {
  const main = document.getElementById("mainContent");
  const filtered = getFiltered();
  document.getElementById("visibleCount").textContent = filtered.length;
  document.getElementById("searchCount").textContent = filtered.length + " terms";
  document.getElementById("noResults").style.display = filtered.length === 0 ? "block" : "none";
  main.innerHTML = "";

  if (currentCat !== "all") {
    main.innerHTML = `<div class="cards-grid">${filtered.map((t,i)=>buildCard(t,i*0.03)).join("")}</div>`;
    return;
  }

  CAT_SECTION_ORDER.forEach(sec => {
    const items = filtered.filter(t => t.cat === sec.key);
    if (!items.length) return;
    const section = document.createElement("div");
    section.innerHTML = `
      <div class="section-header">
        <div class="section-title">${sec.label}</div>
        <div class="section-line"></div>
      </div>
      <div class="cards-grid">${items.map((t,i)=>buildCard(t,i*0.03)).join("")}</div>
    `;
    main.appendChild(section);
  });
}

function toggle(id) {
  if (openSet.has(id)) openSet.delete(id);
  else openSet.add(id);
  render();
  if (openSet.has(id)) {
    setTimeout(() => {
      const el = document.getElementById("card-"+id);
      if (el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
    }, 50);
  }
}

document.getElementById("sidebar").addEventListener("click", e => {
  const btn = e.target.closest(".cat-btn");
  if (!btn) return;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentCat = btn.dataset.cat;
  openSet.clear();
  render();
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value.trim();
  render();
});

render();
</script>
